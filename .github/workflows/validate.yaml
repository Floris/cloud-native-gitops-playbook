name: Validate Repository

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v18
        with:
          config: .markdownlint.json
          globs: |
            **/*.md

      - name: Lint YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_file: .yamllint.yaml

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kubeconform
        shell: bash
        run: |
          set -euo pipefail
          KUBECONFORM_VERSION="v0.6.7"
          curl -sSL -o kubeconform.tar.gz "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          tar -xzf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Validate rendered Kubernetes manifests
        shell: bash
        run: |
          set -euo pipefail
          kubectl kustomize clusters/dev | kubeconform -summary -strict -ignore-missing-schemas
          kubectl kustomize clusters/prod | kubeconform -summary -strict -ignore-missing-schemas
